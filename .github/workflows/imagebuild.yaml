name: build spring-boot

on:
  push:
    branches: 'main'

jobs:
  build_and_publish_image:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo branches
        uses: actions/checkout@v7

      - name: Install docker
        uses: docker/setup-buildx-action@v4

      # - name: docker auth
      #   run:
      #     docker login -u "neeraja21" -p "${{ secrets.DOCKER_PAT }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: neeraja21
          password: ${{ secrets.DOCKER_PAT }}
      # - name: build spring applications
      #   run:
      #     docker image build -t neeraja21/spring-boot:1.0.0 .
      #     docker push neeraja21/spring-boot:1.0.0 .

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: neeraja21/spring-boot:1.0.0